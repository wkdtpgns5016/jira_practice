name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      # 1. Issue Form 본문에서 우선순위 + 이슈 라벨(Labels)에서 이슈 유형 추출
      - name: Parse Priority and Issue Type from Labels
        id: parse_issue
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.issue.body || '';
            const labels = context.payload.issue.labels.map(l => l.name.toLowerCase());

            // 1) 우선순위 추출 (Highest, High, Medium, Low, Lowest)
            const priorityMatch = body.match(/(Highest|High|Medium|Low|Lowest)/i);
            const priority = priorityMatch ? priorityMatch[0] : 'Medium';
            const formattedPriority = priority.charAt(0).toUpperCase() + priority.slice(1).toLowerCase();
            core.setOutput('jira_priority', formattedPriority);

            // 2) GitHub 라벨 보고 Jira 이슈 유형(Issue Type) 매핑
            let issueType = 'Task'; // 기본값 (없을 경우)

            if (labels.includes('bug')) {
              issueType = 'Bug';
            } else if (labels.includes('enhancement')) {
              issueType = 'Feature';
            } else if (labels.includes('documentation')) {
              issueType = 'Document';
            }

            core.setOutput('jira_issuetype', issueType);

      # 2. Jira 로그인
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 3. Jira 이슈 생성 (라벨 기반 issuetype 전달)
      - name: Create Jira Issue
        id: create_jira
        uses: atlassian/gajira-create@v3
        with:
          project: KAN
          issuetype: '${{ steps.parse_issue.outputs.jira_issuetype }}'
          summary: '${{ github.event.issue.title }}'
          description: |
            *GitHub Issue 내용:*
            ${{ github.event.issue.body }}

            ---
            🔗 *GitHub Issue 바로가기:* ${{ github.event.issue.html_url }}
            👤 *작성자:* @${{ github.event.issue.user.login }}
          fields: '{"priority": {"name": "${{ steps.parse_issue.outputs.jira_priority }}"}}'

      # 4. 완료 댓글 작성
      - name: Comment Jira Key
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Jira 이슈가 자동으로 생성되었습니다: **${{ steps.create_jira.outputs.issue }}**`
            })
