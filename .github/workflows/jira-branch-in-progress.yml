name: Move Jira Issue to In Progress on Branch Creation

on:
  create:

jobs:
  move-to-in-progress:
    if: github.event.ref_type == 'branch' && github.event.ref != 'main' && github.event.ref != 'master'
    runs-on: ubuntu-latest
    steps:
      # 1. Jira 로그인 (config.yml 생성 필수 단계)
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 2. 브랜치명(예: KAN-7-feature)에서 Jira 키 추출 및 상태 변경
      - name: Move Jira Issue to In Progress
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ github.event.ref }}
          transition: '진행 중' # 지라의 실제 '진행 중' 컬럼/상태 이름
