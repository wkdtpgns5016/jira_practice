name: Move Jira Issue to In Review on PR Open

on:
  pull_request:
    types: [opened, reopened] # PR이 새로 열리거나 다시 열릴 때 실행

jobs:
  move-jira-to-review:
    runs-on: ubuntu-latest
    steps:
      # 1. Jira 로그인 (config.yml 인증 파일 생성 필수 단계)
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 2. PR 브랜치명/제목에서 Jira 키(예: KAN-7)를 찾아 상태 변경
      - name: Move Jira Issue to In Review
        uses: atlassian/gajira-transition@v3
        with:
          # PR이 생성된 브랜치 이름(head.ref)에서 Jira 이슈 키 자동 추출
          issue: ${{ github.event.pull_request.head.ref }}
          # Jira 프로젝트의 실제 검토 단계 이름 (예: '검토 중' 또는 'In Review')
          transition: '검토 중'
