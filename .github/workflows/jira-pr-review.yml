name: Move Jira Issue to In Review on PR Open

on:
  pull_request:
    types: [opened, reopened] # PR이 새로 열리거나 다시 열릴 때 실행

jobs:
  move-jira-to-review:
    runs-on: ubuntu-latest
    steps:
      # 1. PR 출발지 브랜치명(head.ref)에서 pure Jira 키(예: KAN-9)만 추출
      - name: Parse Jira Issue Key from Branch
        id: parse_jira_key
        uses: actions/github-script@v6
        with:
          script: |
            const branchName = context.payload.pull_request.head.ref || '';
            
            // 브랜치명에서 KAN-9 형태 정규식 추출
            const match = branchName.match(/([A-Z]+-\d+)/);
            
            if (match && match[1]) {
              console.log(`Found Jira Key: ${match[1]}`);
              core.setOutput('jira_key', match[1]);
            } else {
              core.setFailed(`브랜치명 '${branchName}'에서 Jira 키를 찾을 수 없습니다.`);
            }

      # 2. Jira 로그인
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 3. 추출한 Jira 키(KAN-9)만 전달하여 상태 변경
      - name: Move Jira Issue to In Review
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.parse_jira_key.outputs.jira_key }}
          transition: '검토 중'
