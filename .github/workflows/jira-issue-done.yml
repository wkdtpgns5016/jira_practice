name: Move Jira Issue to Done on GitHub Issue Close

on:
  issues:
    types: [closed]

jobs:
  move-jira-to-done:
    runs-on: ubuntu-latest
    steps:
      # 1. 자동 댓글에서 어떤 프로젝트 키(예: KAN-4, TEST-12)든 지라 키만 추출
      - name: Parse Jira Issue Key from Automated Comment
        id: parse_jira_key
        uses: actions/github-script@v6
        with:
          script: |
            const issueNumber = context.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const comments = await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber });
            
            // 자동 댓글 찾기
            const targetComment = comments.data.find(c => c.body.includes('Jira 이슈가 자동으로 생성되었습니다'));
            
            // 모든 지라 키 패턴(대문자 알파벳 조합 + '-' + 숫자) 추출
            const jiraKey = targetComment ? targetComment.body.match(/[A-Z]+-\d+/)?.[0] : null;

            if (jiraKey) {
              console.log(`Found Jira Key: ${jiraKey}`);
              core.setOutput('jira_key', jiraKey);
            } else {
              core.setFailed(`이슈 #${issueNumber}에서 Jira 키 댓글을 찾을 수 없습니다.`);
            }

      # 2. Jira 로그인
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 3. 추출한 Jira 키를 전달하여 완료 상태로 변경
      - name: Move Jira Issue to Done
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.parse_jira_key.outputs.jira_key }}
          transition: '완료'
