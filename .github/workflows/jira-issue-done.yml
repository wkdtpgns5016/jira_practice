name: Move Jira Issue to Done on GitHub Issue Close

on:
  issues:
    types: [closed]

jobs:
  move-jira-to-done:
    runs-on: ubuntu-latest
    steps:
      # 1. Jira 로그인 (필수! config.yml 생성 단계)
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 2. Jira 이슈 상태 변경
      - name: Move Jira Issue to Done
        uses: atlassian/gajira-transition@v3
        with:
          # GitHub 이슈 본문(body)에서 Jira 키(예: KAN-7) 자동 탐지
          issue: ${{ github.event.issue.body }}
          # 지라의 실제 완료 컬럼/상태 이름
          transition: '완료'
