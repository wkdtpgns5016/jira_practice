name: Sync GitHub Issue to Jira

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  create-jira-issue:
    runs-on: ubuntu-latest
    steps:
      # 1. Issue Form 본문에서 선택된 우선순위 텍스트 바로 추출
      - name: Parse Priority from Issue Body
        id: parse_priority
        uses: actions/github-script@v6
        with:
          script: |
            const body = context.payload.issue.body || '';
            
            // 본문에서 Highest, High, Medium, Low, Lowest 중 선택된 값 찾기
            const match = body.match(/(Highest|High|Medium|Low|Lowest)/i);
            const priority = match ? match[0] : 'Medium'; // 못 찾으면 기본값 Medium
            
            // 첫 글자만 대문자로 정형화 (예: high -> High)
            const formattedPriority = priority.charAt(0).toUpperCase() + priority.slice(1).toLowerCase();
            core.setOutput('jira_priority', formattedPriority);

      # 2. Jira 로그인
      - name: Jira Login
        uses: atlassian/gajira-login@v3
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      # 3. Jira 이슈 생성 (추출한 우선순위 전달)
      - name: Create Jira Issue
        id: create_jira
        uses: atlassian/gajira-create@v3
        with:
          project: KAN
          issuetype: 작업
          summary: '${{ github.event.issue.title }}'
          description: |
            *GitHub Issue 내용:*
            ${{ github.event.issue.body }}

            ---
            🔗 *GitHub Issue 바로가기:* ${{ github.event.issue.html_url }}
            👤 *작성자:* @${{ github.event.issue.user.login }}
          fields: '{"priority": {"name": "${{ steps.parse_priority.outputs.jira_priority }}"}}'

      # 4. 완료 댓글 작성
      - name: Comment Jira Key
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🎉 Jira 이슈가 자동으로 생성되었습니다: **${{ steps.create_jira.outputs.issue }}**`
            })
