name: "✨ 기능 요청 (Feature Request)"
description: "새로운 기능이나 작업 항목을 등록합니다."
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 GitHub Issue 작성 양식
        작성된 내용은 Jira 이슈로 자동 등록됩니다. 필요한 정보를 명확히 작성해 주세요!

  - type: textarea
    id: description
    attributes:
      label: "작업 개요"
      description: "어떤 작업이 필요한지 구체적으로 적어주세요."
      placeholder: "예: 로그인 페이지에 소셜 로그인(구글, 카카오) 버튼을 추가합니다."
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: "세부 작업 목록 (Checklist)"
      description: "진행할 세부 항목들을 체크리스트 형태로 적어주세요."
      placeholder: |
        - [ ] 카카오 API 연동
        - [ ] 구글 API 연동
        - [ ] 로그인 성공 테스트
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "우선순위"
      options:
        - "Highest"
        - "High"
        - "Medium"
        - "Low"
        - "Lowest"
      default: 2
    validations:
      required: true

  - type: textarea
    id: additional_notes
    attributes:
      label: "참고 사항 및 참고 링크"
      description: "디자인 시안(Figma), API 명세서, 기타 참고할 링크가 있다면 첨부해 주세요."
      placeholder: "https://figma.com/..."
    validations:
      required: false
