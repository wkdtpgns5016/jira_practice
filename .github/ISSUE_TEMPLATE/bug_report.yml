name: "🐛 버그 리포트 (Bug Report)"
description: "서비스 이용 중 발생한 문제나 오류를 제보합니다."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ### 📌 버그 리포트 작성 양식
        버그 재현 방법과 환경을 명확히 작성해 주시면 빠른 해결에 큰 도움이 됩니다!
        *(작성된 내용은 Jira 이슈로 자동 연동됩니다)*

  - type: textarea
    id: bug-description
    attributes:
      label: "버그 설명"
      description: "어떤 문제가 발생했는지 간략히 설명해 주세요."
      placeholder: "예: 결제 페이지에서 카카오페이 선택 후 결제 버튼을 누르면 화면이 멈춥니다."
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: "버그 재현 단계"
      description: "문제를 재현할 수 있는 순서를 차례대로 적어주세요."
      placeholder: |
        1. '장바구니' 페이지로 이동
        2. '구매하기' 버튼 클릭
        3. 결제 수단 중 '카카오페이' 선택
        4. '결제하기' 버튼 클릭 시 응답 없음
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: "기대했던 동작"
      description: "정상적이라면 어떤 결과가 나와야 하는지 적어주세요."
      placeholder: "예: 카카오페이 결제 팝업창이 정상적으로 떠야 합니다."
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "발생 환경"
      options:
        - Chrome (PC)
        - Safari (PC)
        - Mobile App (iOS)
        - Mobile App (Android)
        - 기타 (설명란에 작성)
      default: 0
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: "스크린샷 및 에러 로그"
      description: "오류 화면이나 콘솔 에러 로그(Console Log)가 있다면 첨부해 주세요."
      placeholder: "이미지를 여기에 드래그 앤 드롭하거나 에러 텍스트를 붙여넣으세요."
    validations:
      required: false
