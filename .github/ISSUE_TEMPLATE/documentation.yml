name: "📚 문서 작성 (Documentation)"
description: 프로젝트 문서(README, API 명세, 가이드 등) 작성 및 수정 시 사용합니다.
title: "[Doc]: "
labels: ["documentation"] # GitHub 라벨 자동 지정 -> Jira에서 Document 유형으로 변환됨

body:
  - type: markdown
    attributes:
      value: |
        ### 📚 문서 작성 요청
        문서화 작업에 대한 구체적인 내용을 아래 항목에 따라 작성해 주세요.

  - type: textarea
    id: overview
    attributes:
      label: "✨ 문서 작성 개요"
      description: "어떤 문서를 새로 작성하거나 수정하는지 핵심만 작성해 주세요."
      placeholder: "예: 소셜 로그인 API 문서 업데이트 / README 설치 가이드 수정"
    validations:
      required: true

  - type: checkboxes
    id: doc_type
    attributes:
      label: "📌 문서 종류"
      description: "해당하는 문서 작업 유형을 체크해 주세요."
      options:
        - label: "README / 프로젝트 기본 가이드"
        - label: "API 명세서 및 엔드포인트 문서"
        - label: "아키텍처 및 시스템 설계 문서"
        - label: "개발자 환경 구축 및 가이드"
        - label: "기타 레퍼런스 문서"

  - type: textarea
    id: checklist
    attributes:
      label: "📋 상세 작업 목록 (Checklist)"
      description: "작성할 문서의 세부 목차나 다룰 내용을 작성해 주세요."
      placeholder: |
        - [ ] OAuth2.0 인가 코드 흐름 시퀀스 다이어그램 추가
        - [ ] 에러 코드 정의표 최신화 (401, 403 예외 처리 추가)
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: "🚨 우선순위"
      description: "작업의 시급성을 선택해 주세요."
      options:
        - Medium
        - High
        - Highest
        - Low
        - Lowest
      default: 0
    validations:
      required: true

  - type: textarea
    id: references
    attributes:
      label: "🔗 참고 자료 및 링크"
      description: "참고할 Figma, Notion, 외부 문서 링크 등이 있다면 첨부해 주세요."
      placeholder: "예: Notion API 스펙 문서 링크..."
    validations:
      required: false
